name: Main (Production) CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'PreflightApi.API/**'
      - 'PreflightApi.Domain/**'
      - 'PreflightApi.Infrastructure/**'
      - 'PreflightApi.Azure.Functions/**'
      - 'PreflightApi.Tests/**'
      - '.github/workflows/main-ci-cd.yml'
      - 'apim-policies/**'
      - 'Directory.Build.props'

env:
  DOTNET_CORE_VERSION: 8.0.x
  CONFIGURATION: Release
  API_PUBLISH_DIR: ./api-publish
  FUNCTIONS_PUBLISH_DIR: ./functions-publish
  API_APP_NAME: was-eastus-preflightapi-prd
  FUNCTION_APP_NAME: function-app-eastus-preflightapi-prd
  RESOURCE_GROUP: rg-eastus-preflightapi-prd
  DB_SERVER_NAME: pgsql-eastus2-preflightapi-prd
  APIM_SERVICE_NAME: apim-eastus-preflightapi-prd

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          while git ls-remote --tags origin "refs/tags/v${MAJOR}.${MINOR}.${PATCH}" | grep -q .; do
            echo "Tag v${MAJOR}.${MINOR}.${PATCH} exists — incrementing patch"
            PATCH=$((PATCH + 1))
          done
          FINAL="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${FINAL}" >> $GITHUB_OUTPUT
          if [ "$FINAL" != "$VERSION" ]; then
            sed -i "s|<Version>${VERSION}</Version>|<Version>${FINAL}</Version>|" Directory.Build.props
            sed -i "s|<AssemblyVersion>${VERSION}</AssemblyVersion>|<AssemblyVersion>${FINAL}</AssemblyVersion>|" Directory.Build.props
            sed -i "s|<FileVersion>${VERSION}</FileVersion>|<FileVersion>${FINAL}</FileVersion>|" Directory.Build.props
            echo "Auto-bumped: ${VERSION} → ${FINAL}"
          else
            echo "Version ${FINAL} is available — no bump needed"
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

      - name: Restore solution
        run: dotnet restore PreflightApi.sln

      - name: Build solution
        run: dotnet build PreflightApi.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run unit tests
        run: >
          dotnet test PreflightApi.Tests/PreflightApi.Tests.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build --verbosity normal
          --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~BriefingTests.BriefingServiceTests&FullyQualifiedName!~EmailVerificationTests"

      # Publish API
      - name: Publish API
        run: dotnet publish PreflightApi.API/PreflightApi.API.csproj --configuration ${{ env.CONFIGURATION }} --output ${{ env.API_PUBLISH_DIR }}

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: preflightapi-api
          path: ${{ env.API_PUBLISH_DIR }}
          if-no-files-found: error

      # Publish Functions
      - name: Publish Functions
        run: dotnet publish PreflightApi.Azure.Functions/PreflightApi.Azure.Functions.csproj --configuration ${{ env.CONFIGURATION }} --output ${{ env.FUNCTIONS_PUBLISH_DIR }}

      - name: Create Functions metadata
        run: mkdir -p ${{ env.FUNCTIONS_PUBLISH_DIR }}/.azurefunctions && echo '{}' > ${{ env.FUNCTIONS_PUBLISH_DIR }}/.azurefunctions/functionsmetadata

      - name: Create Functions zip
        run: cd ${{ env.FUNCTIONS_PUBLISH_DIR }} && zip -r $GITHUB_WORKSPACE/functionapp.zip .

      - name: Upload Functions zip
        uses: actions/upload-artifact@v4
        with:
          name: preflightapi-functions
          path: functionapp.zip
          if-no-files-found: error

      # EF Migration Bundle
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Create EF migrations bundle
        run: >
          dotnet ef migrations bundle
          --project PreflightApi.Infrastructure/PreflightApi.Infrastructure.csproj
          --startup-project PreflightApi.API/PreflightApi.API.csproj
          --configuration ${{ env.CONFIGURATION }}
          -o efbundle
          --force

      - name: Upload EF bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ef-bundle
          path: efbundle
          if-no-files-found: error

      - name: Push version bump
        run: |
          if git diff --quiet Directory.Build.props; then
            echo "No version change to push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "chore: auto-bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push || echo "::warning::Could not push version bump — release will still be created"

  sync-types:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: BeyondBelief96/preflightapi.frontend
          ref: master
          token: ${{ secrets.FRONTEND_REPO_PAT }}
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate internal API types
        run: node scripts/sync-internal-types.mjs --out frontend/src/generated/internal-api.ts

      - name: Check for changes
        id: diff
        working-directory: frontend
        run: |
          git add src/generated/internal-api.ts
          git diff --cached --quiet src/generated/internal-api.ts && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push types
        if: steps.diff.outputs.changed == 'true'
        working-directory: frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync internal API types from backend

          Auto-generated by backend CI pipeline.
          Source commit: ${{ github.sha }}"
          git push

  migrations:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GITHUB_DEPLOYMENT_PRD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PRD_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_PRD_SUBSCRIPTION_ID }}

      - name: Get runner IP
        id: runner-ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Whitelist runner IP on database
        run: >
          az postgres flexible-server firewall-rule create
          --resource-group ${{ env.RESOURCE_GROUP }}
          --name ${{ env.DB_SERVER_NAME }}
          --rule-name github-runner-${{ github.run_id }}
          --start-ip-address ${{ steps.runner-ip.outputs.ip }}
          --end-ip-address ${{ steps.runner-ip.outputs.ip }}

      - name: Download EF bundle
        uses: actions/download-artifact@v4
        with:
          name: ef-bundle

      - name: Make bundle executable
        run: chmod +x efbundle

      - name: Apply migrations
        run: ./efbundle --connection "${{ secrets.DB_CONNECTION_STRING_PRD }}"

      - name: Remove runner IP from database firewall
        if: always()
        run: >
          az postgres flexible-server firewall-rule delete
          --resource-group ${{ env.RESOURCE_GROUP }}
          --name ${{ env.DB_SERVER_NAME }}
          --rule-name github-runner-${{ github.run_id }}
          --yes

  deploy:
    needs: [build, migrations]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GITHUB_DEPLOYMENT_PRD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PRD_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_PRD_SUBSCRIPTION_ID }}

      - name: Stop Function App (prevent alerts during deployment)
        run: >
          az functionapp stop
          --resource-group ${{ env.RESOURCE_GROUP }}
          --name ${{ env.FUNCTION_APP_NAME }}

      - name: Enable maintenance mode
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          az rest --method put \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ApiManagement/service/${{ env.APIM_SERVICE_NAME }}/namedValues/maintenance-mode?api-version=2024-05-01" \
            --body '{"properties":{"displayName":"maintenance-mode","value":"true"}}'
          echo "Maintenance mode enabled — APIM will return 503 to API requests"

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: preflightapi-api
          path: ${{ env.API_PUBLISH_DIR }}

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          package: ${{ env.API_PUBLISH_DIR }}

      - name: Restart API
        run: az webapp restart --name ${{ env.API_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Get API hostname
        run: |
          API_HOSTNAME=$(az webapp show --name ${{ env.API_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query defaultHostName -o tsv)
          echo "API_HOSTNAME=$API_HOSTNAME" >> $GITHUB_ENV
          echo "Resolved API hostname: $API_HOSTNAME"

      - name: Wait for API and download swagger spec
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf "https://${{ env.API_HOSTNAME }}/swagger/v1/swagger.json" -o swagger.json; then
              echo "API is ready after attempt $i — swagger spec saved locally"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done
          echo "::error::API did not become healthy after 30 attempts (5 minutes)"
          exit 1

      - name: Import OpenAPI spec into APIM
        run: |
          az apim api import \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --service-name ${{ env.APIM_SERVICE_NAME }} \
            --api-id preflightapi \
            --path "" \
            --specification-format OpenApiJson \
            --specification-path swagger.json

      # Deploy Functions
      - name: Download Functions zip
        uses: actions/download-artifact@v4
        with:
          name: preflightapi-functions

      - name: Deploy Functions
        run: >
          az functionapp deployment source config-zip
          --resource-group ${{ env.RESOURCE_GROUP }}
          --name ${{ env.FUNCTION_APP_NAME }}
          --src functionapp.zip

      - name: Restart Function App
        if: always()
        run: >
          az functionapp start
          --resource-group ${{ env.RESOURCE_GROUP }}
          --name ${{ env.FUNCTION_APP_NAME }}

      # Deploy APIM Policies
      - name: Checkout for APIM policies
        uses: actions/checkout@v4
        with:
          sparse-checkout: apim-policies
          path: repo

      - name: Deploy APIM API-level policy
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          BASE_URL="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ApiManagement/service/${{ env.APIM_SERVICE_NAME }}"
          API_VERSION="2024-05-01"

          echo "Deploying API-level policy"
          policy_content=$(python3 -c "import json; print(json.dumps(open('repo/apim-policies/api-policy.xml').read()))")
          az rest --method put \
            --url "${BASE_URL}/apis/preflightapi/policies/policy?api-version=${API_VERSION}" \
            --body "{\"properties\":{\"format\":\"rawxml\",\"value\":${policy_content}}}"

      - name: Deploy APIM product policies
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          BASE_URL="https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ApiManagement/service/${{ env.APIM_SERVICE_NAME }}/products"
          API_VERSION="2024-05-01"

          for policy_file in repo/apim-policies/*-policy.xml; do
            [ "$(basename "$policy_file")" = "api-policy.xml" ] && continue
            product_id=$(basename "$policy_file" | sed 's/-policy\.xml//')
            echo "Deploying policy for product: ${product_id}"
            policy_content=$(python3 -c "import json; print(json.dumps(open('${policy_file}').read()))")
            az rest --method put \
              --url "${BASE_URL}/${product_id}/policies/policy?api-version=${API_VERSION}" \
              --body "{\"properties\":{\"format\":\"rawxml\",\"value\":${policy_content}}}"
          done

      - name: Disable maintenance mode
        if: always()
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          az rest --method put \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.ApiManagement/service/${{ env.APIM_SERVICE_NAME }}/namedValues/maintenance-mode?api-version=2024-05-01" \
            --body '{"properties":{"displayName":"maintenance-mode","value":"false"}}'
          echo "Maintenance mode disabled — APIM is back to normal"

  release:
    needs: [deploy, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        run: >
          gh release create "v${{ needs.build.outputs.version }}"
          --title "v${{ needs.build.outputs.version }}"
          --generate-notes
          --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
